# CodeQL Security Analysis for MacPorts Ports Repository
# Scans for security vulnerabilities in code patches and scripts
#
# Note: This repository primarily contains Tcl Portfiles and shell scripts.
# CodeQL analyzes C/C++ patches and Python scripts that may be included.
#
name: "CodeQL Security Scan"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    # Run weekly on Thursday at 19:40 UTC
    - cron: '40 19 * * 4'

# Restrict workflow permissions to minimum required
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # Required for CodeQL to upload results
      security-events: write
      # Required to fetch code
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Analyze C/C++ patch files for security issues
          - language: c-cpp
            build-mode: none
          # Analyze Python scripts and patches
          - language: python
            build-mode: none
          # Analyze GitHub Actions workflows for security issues
          - language: actions
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Use extended security queries for more thorough analysis
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
